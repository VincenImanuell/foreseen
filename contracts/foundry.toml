[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
evm_version = "paris"
optimizer = true
optimizer_runs = 200
ffi = false

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

# Celo Alfajores testnet only (no mainnet during development)
[rpc_endpoints]
alfajores = "https://alfajores-forno.celo-testnet.org"

[etherscan]
alfajores = { key = "${CELOSCAN_API_KEY}", url = "https://api-alfajores.celoscan.io/api", chain = 44787 }

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
