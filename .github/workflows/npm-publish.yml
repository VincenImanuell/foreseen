name: Publish SDK to npm

# Publishes @foreseen/sdk to the public npm registry when a GitHub Release is
# published, or on manual dispatch. Requires the NPM_TOKEN repository secret
# (an npm automation token with publish rights to the @foreseen scope).
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: build + publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
